name: Deploy

on:
  push:
    branches:
  - master

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3 

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
         dotnet-version: 10.0.x

    - name: Install MAUI workloads
      run: dotnet workload install maui

    - name: Restore
      run: dotnet restore
      working-directory: ./ContinuousDeployment

    - name: Build
      run: dotnet build -c Release -f:net10.0-windows10.0.19041.0
      working-directory: ./ContinuousDeployment

    - name: Publish
      run: dotnet publish -c Release -f:net10.0-windows10.0.19041.0 /p:GenerateAppsxPackageOnBuild=true /p:AppxPackageSigningEnabled=false /p:AppxBundle=Never
      working-directory: ./ContinuousDeployment
          
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Build
        path: ./ContinuousDeployment/bin/Release/net10.0-windows10.0.19041.0/win-x64/AppPackages/**/*.msix